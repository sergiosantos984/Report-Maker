<!DOCTYPE html>
<html lang="en" class="h-full bg-[#FAFAFC] text-[#1D1D1F] antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aptonet Report & Executive Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ================= ULTRA-COMPACT PRINT PAGE-FIT ENGINE ================= */
        @media print {
            @page {
                size: letter landscape;
                margin: 4mm 4mm 4mm 4mm; 
            }
            body {
                background: #ffffff !important;
                color: #000000 !important;
                font-size: 8px !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            #landingView, 
            header, 
            #resetBtn, 
            #sheetSelector,
            #sortConsultantBtn, 
            #tableSearch, 
            #clearFiltersBtn,
            #actionButtonsWrapper,
            #saveGlobalDataBtn,
            .bg-slate-200\/60 {
                display: none !important;
            }
            #dashboardView {
                display: block !important;
                background: #ffffff !important;
                padding: 0 !important;
            }
            main {
                max-w-full !important;
                padding: 0 !important;
                space-y-2 !important;
            }
            .grid {
                display: flex !important;
                flex-direction: row !important;
                gap: 6px !important;
                page-break-inside: avoid !important;
                margin-bottom: 6px !important;
            }
            .grid > div {
                flex: 1 !important;
                border: 1px solid #cbd5e1 !important;
                box-shadow: none !important;
                padding: 6px !important;
                page-break-inside: avoid !important;
            }
            #kpiGrid {
                display: grid !important;
                grid-template-columns: repeat(7, minmax(0, 1fr)) !important;
                gap: 4px !important;
                margin-bottom: 6px !important;
            }
            .overflow-x-auto {
                overflow: visible !important;
                max-width: 100% !important;
            }
            table {
                page-break-inside: auto !important;
                width: 100% !important;
                table-layout: fixed !important; 
                border-collapse: collapse !important;
            }
            tr {
                page-break-inside: avoid !important;
                page-break-after: auto !important;
            }
            thead {
                display: table-header-group !important;
            }
            th, td {
                padding: 2px 3px !important; 
                font-size: 7.5px !important;
                line-height: 1.05 !important;
                overflow: hidden !important;
                text-overflow: ellipsis !important;
                white-space: nowrap !important;
            }
            th {
                background-color: #f1f5f9 !important;
                color: #1e293b !important;
                border: 1px solid #cbd5e1 !important;
            }
            td {
                border: 1px solid #e2e8f0 !important;
            }
            #printHeaderBranding {
                display: block !important;
                margin-bottom: 6px;
                border-bottom: 2px solid #1d1d1f;
                padding-bottom: 2px;
            }
        }
    </style>
</head>
<body class="h-full">

    <div id="printHeaderBranding" class="hidden">
        <div class="flex justify-between items-end">
            <div>
                <h1 class="text-lg font-bold tracking-tight">Aptonet Executive Intelligence Report</h1>
                <p class="text-[10px] text-gray-500 mt-0.5">Comprehensive Candidate Pipeline Matrix & Operational Status Tracker</p>
            </div>
            <div class="text-right text-[9px] text-gray-400">
                <p>Status: Confidential Executive Briefing</p>
                <p id="printDateStamp"></p>
            </div>
        </div>
    </div>

    <div id="landingView" class="min-h-screen flex flex-col justify-between p-6 sm:p-12 transition-all duration-500">
        <header class="flex justify-between items-center max-w-7xl w-full mx
